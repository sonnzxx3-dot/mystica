<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a1f5c"/>
      <stop offset="55%" stop-color="#13102e"/>
      <stop offset="100%" stop-color="#070512"/>
    </radialGradient>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e0ad"/>
      <stop offset="50%" stop-color="#d4af6a"/>
      <stop offset="100%" stop-color="#b8923f"/>
    </linearGradient>
    <filter id="fglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#fbg)"/>

  <!-- звёзды -->
  <g fill="#fff">
    <circle cx="120" cy="80" r="2.5" opacity="0.8"/>
    <circle cx="300" cy="60" r="2" opacity="0.6"/>
    <circle cx="700" cy="90" r="2.2" opacity="0.7"/>
    <circle cx="900" cy="130" r="3" opacity="0.85"/>
    <circle cx="80" cy="300" r="2" opacity="0.6"/>
    <circle cx="950" cy="380" r="2.5" opacity="0.75"/>
    <circle cx="200" cy="420" r="2.2" opacity="0.7"/>
    <circle cx="620" cy="430" r="2" opacity="0.6"/>
  </g>

  <!-- колесо зодиака справа (декоративное) -->
  <g transform="translate(820,250)" opacity="0.9" filter="url(#fglow)">
    <circle r="130" fill="none" stroke="#d4af6a" stroke-width="1.5" opacity="0.5"/>
    <circle r="95" fill="none" stroke="#d4af6a" stroke-width="1" opacity="0.35"/>
    <g fill="#e8d4a0">
      <circle cx="0" cy="-112" r="4"/><circle cx="56" cy="-97" r="4"/><circle cx="97" cy="-56" r="4"/>
      <circle cx="112" cy="0" r="4"/><circle cx="97" cy="56" r="4"/><circle cx="56" cy="97" r="4"/>
      <circle cx="0" cy="112" r="4"/><circle cx="-56" cy="97" r="4"/><circle cx="-97" cy="56" r="4"/>
      <circle cx="-112" cy="0" r="4"/><circle cx="-97" cy="-56" r="4"/><circle cx="-56" cy="-97" r="4"/>
    </g>
    <g stroke="#d4af6a" stroke-width="0.8" opacity="0.3">
      <line x1="0" y1="-130" x2="0" y2="-95"/><line x1="112" y1="0" x2="82" y2="0"/>
      <line x1="0" y1="130" x2="0" y2="95"/><line x1="-112" y1="0" x2="-82" y2="0"/>
    </g>
    <circle r="5" fill="#d4af6a"/>
  </g>

  <!-- полумесяц слева -->
  <g transform="translate(180,250)" filter="url(#fglow)">
    <path d="M 60 0 A 80 80 0 1 1 -22 -79 A 62 62 0 1 0 60 0 Z" fill="url(#fgold)"/>
  </g>

  <!-- текст -->
  <text x="400" y="210" font-family="Georgia, serif" font-size="76" font-weight="600" fill="url(#fgold)" letter-spacing="6">МИСТИКА</text>
  <text x="402" y="265" font-family="Georgia, serif" font-size="26" fill="#9a93b8" letter-spacing="4">ТАРО · ГОРОСКОПЫ · СУДЬБА</text>
  <text x="402" y="320" font-family="sans-serif" font-size="20" fill="#cfc9e0">78 карт · натальная карта · совместимость</text>
</svg>
