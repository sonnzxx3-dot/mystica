<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a1f5c"/>
      <stop offset="55%" stop-color="#13102e"/>
      <stop offset="100%" stop-color="#070512"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e0ad"/>
      <stop offset="45%" stop-color="#d4af6a"/>
      <stop offset="100%" stop-color="#b8923f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- фон со скруглением (Android сам наложит маску, но фон рисуем полным) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- звёзды -->
  <g fill="#fff">
    <circle cx="110" cy="120" r="3" opacity="0.9"/>
    <circle cx="400" cy="95" r="2.5" opacity="0.7"/>
    <circle cx="430" cy="200" r="2" opacity="0.6"/>
    <circle cx="90" cy="300" r="2.2" opacity="0.7"/>
    <circle cx="140" cy="420" r="2.6" opacity="0.8"/>
    <circle cx="420" cy="400" r="3" opacity="0.85"/>
    <circle cx="380" cy="320" r="1.8" opacity="0.5"/>
    <circle cx="70" cy="190" r="1.8" opacity="0.5"/>
  </g>
  <g fill="#d4af6a">
    <circle cx="360" cy="150" r="2.4" opacity="0.9"/>
    <circle cx="150" cy="360" r="2.2" opacity="0.8"/>
  </g>

  <!-- полумесяц -->
  <g filter="url(#glow)">
    <path d="M 330 256
             A 110 110 0 1 1 218 147
             A 86 86 0 1 0 330 256 Z"
          fill="url(#gold)"/>
  </g>

  <!-- маленькая звезда-искра у месяца -->
  <g fill="url(#gold)" filter="url(#glow)">
    <path d="M 340 180 l 8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 Z"/>
  </g>
</svg>
